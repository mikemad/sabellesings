name: Fetch YouTube Feed

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch YouTube RSS feed
        run: |
          curl -sf --max-time 30 \
            "https://www.youtube.com/feeds/videos.xml?channel_id=UC2_f3_-kgw2I8kqVY69rerg" \
            -o youtube-feed.xml

      - name: Commit and push if changed
        run: |
          git add youtube-feed.xml
          git diff --staged --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update YouTube feed"
          git push
