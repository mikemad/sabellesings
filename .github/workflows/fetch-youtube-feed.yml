name: Fetch YouTube Feed

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  fetch-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch YouTube RSS feed
        run: |
          curl -sf --max-time 30 \
            "https://www.youtube.com/feeds/videos.xml?channel_id=UC2_f3_-kgw2I8kqVY69rerg" \
            -o youtube-feed.xml

      - name: Commit and push if changed
        id: commit
        run: |
          git add youtube-feed.xml
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Update YouTube feed"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        run: |
          gh workflow run "Deploy static content to Pages" --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
